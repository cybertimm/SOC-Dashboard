/* ══════════ CHART COMPONENTS ══════════ */
function TimeChart({data,width=680,height=170}) {
  const ref = useRef();
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    const svg=d3.select(ref.current); svg.selectAll("*").remove();
    const m={top:16,right:16,bottom:32,left:38}, w=width-m.left-m.right, h=height-m.top-m.bottom;
    const g=svg.append("g").attr("transform",`translate(${m.left},${m.top})`);
    const x=d3.scaleBand().domain(data.map(d=>d.label)).range([0,w]).padding(0.3);
    const y=d3.scaleLinear().domain([0,d3.max(data,d=>d.total)||1]).nice().range([h,0]);
    g.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x).tickSize(0)).selectAll("text").style("fill","#666").style("font-size","10px").attr("transform","rotate(-25)").style("text-anchor","end");
    g.append("g").call(d3.axisLeft(y).ticks(4).tickSize(-w)).selectAll("text").style("fill","#666").style("font-size","10px");
    g.selectAll(".tick line").style("stroke","#222"); g.selectAll(".domain").style("stroke","#333");
    data.forEach(d=>{
      const fH=y(0)-y(d.fail), sH=y(0)-y(d.success);
      g.append("rect").attr("x",x(d.label)).attr("y",h-fH-sH).attr("width",x.bandwidth()).attr("height",sH).attr("fill","#6bbd5b").attr("rx",2);
      g.append("rect").attr("x",x(d.label)).attr("y",h-fH).attr("width",x.bandwidth()).attr("height",fH).attr("fill","#ff4444").attr("rx",2);
    });
  },[data,width,height]);
  return <svg ref={ref} width={width} height={height}/>;
}

function MiniBar({data,color="#6bbd5b",w=180,h=28}) {
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    const svg=d3.select(ref.current); svg.selectAll("*").remove();
    const x=d3.scaleBand().domain(data.map((_,i)=>i)).range([0,w]).padding(0.4);
    const y=d3.scaleLinear().domain([0,d3.max(data)||1]).range([h,2]);
    data.forEach((v,i)=>{svg.append("rect").attr("x",x(i)).attr("y",y(v)).attr("width",x.bandwidth()).attr("height",h-y(v)).attr("fill",color).attr("rx",2).attr("opacity",0.8);});
  },[data,color,w,h]);
  return <svg ref={ref} width={w} height={h}/>;
}

function DonutChart({segments,size=110}) {
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current) return;
    const svg=d3.select(ref.current); svg.selectAll("*").remove();
    const r=size/2-8, g=svg.append("g").attr("transform",`translate(${size/2},${size/2})`);
    const pie=d3.pie().value(d=>d.value).sort(null);
    const arc=d3.arc().innerRadius(r*0.62).outerRadius(r);
    g.selectAll("path").data(pie(segments)).enter().append("path").attr("d",arc).attr("fill",d=>d.data.color).attr("stroke","#111").attr("stroke-width",2);
    g.append("text").attr("text-anchor","middle").attr("dy","0.35em").style("fill","#e0e0e0").style("font-size","17px").style("font-weight","700").text(segments.reduce((a,s)=>a+s.value,0));
  },[segments,size]);
  return <svg ref={ref} width={size} height={size}/>;
}

        <div key={i} style={{display:"flex",gap:10,marginBottom:10,position:"relative"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#666",fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>{e.time}</span>
              <span style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:SEV[e.sev]+"22",color:SEV[e.sev],fontWeight:700}}>{e.mitre}</span>
            </div>
            <div style={{color:"#d0d0d0",fontSize:12,fontWeight:600,marginTop:2}}>{e.title}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════ MITRE TECH DETAIL PANEL ══════════ */
function TechDetailPanel({tech, tactic, tacticColor, onClose}) {

  return (
    <div className="slide-in" style={{background:"#141414",border:`1px solid ${tacticColor}33`,borderRadius:8,padding:18,position:"sticky",top:0,maxHeight:"calc(100vh - 140px)",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:STCOL[tech.status]+"22",color:STCOL[tech.status],fontWeight:700}}>{STLBL[tech.status]}</span>

          <div style={{background:"#0d0d0d",borderRadius:5,padding:10,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#ffd700",lineHeight:1.6,borderLeft:"3px solid #ffd70044"}}>{tech.evidence}</div>
        </div>
      )}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,color:"#666",textTransform:"uppercase",fontWeight:700,marginBottom:5}}>Detection Methods</div>
        <div style={{fontSize:12,color:"#aaa",lineHeight:1.7,background:"#0d0d0d",borderRadius:5,padding:10,borderLeft:"3px solid #4fc3f744"}}>{tech.detect}</div>
      </div>
      <div>
        <div style={{fontSize:10,color:"#666",textTransform:"uppercase",fontWeight:700,marginBottom:5}}>Remediation Steps</div>
        <div style={{background:"#0d0d0d",borderRadius:5,padding:10,borderLeft:"3px solid #6bbd5b44"}}>
          {tech.fix.split(";").map((step,i)=>(
            <div key={i} style={{display:"flex",gap:7,marginBottom:i<tech.fix.split(";").length-1?6:0}}>
              <span style={{color:"#6bbd5b",flexShrink:0,marginTop:1}}>{I.check("#6bbd5b",11)}</span>
              <span style={{fontSize:11,color:"#bbb",lineHeight:1.5}}>{step.trim()}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════ MAIN APP ══════════ */
function App() {
  const [activeTab,setActiveTab]=useState("overview");
  const [query,setQuery]=useState("");
  const [searchResults,setSearchResults]=useState(null);
  const [selectedAlert,setSelectedAlert]=useState(null);
  const [alertStatuses,setAlertStatuses]=useState({});
  const [alertNotes,setAlertNotes]=useState({});
  const [expandedLog,setExpandedLog]=useState(null);
  const [alertFilter,setAlertFilter]=useState("all");
  const [evTypeFilter,setEvTypeFilter]=useState("all");
  const [mitreView,setMitreView]=useState("cards");
  const [selectedTech,setSelectedTech]=useState(null);
  const [selectedTactic,setSelectedTactic]=useState(null);
  const [caseNotes,setCaseNotes]=useState("");
  const [containmentDone,setContainmentDone]=useState({});
  const [clock,setClock]=useState("");

  useEffect(()=>{
    const tick=()=>{const n=new Date();setClock(n.toUTCString().replace("GMT","UTC"));};
    tick(); const id=setInterval(tick,1000); return ()=>clearInterval(id);
  },[]);

  const filteredLogs=useMemo(()=>{
    let logs=LOGS;
    if(searchResults){const q=searchResults.toLowerCase();logs=logs.filter(l=>Object.values(l).some(v=>String(v).toLowerCase().includes(q)));}
    if(evTypeFilter!=="all") logs=logs.filter(l=>l.type===evTypeFilter);
    return logs;
  },[searchResults,evTypeFilter]);

  const filteredAlerts=useMemo(()=>alertFilter==="all"?ALERTS:ALERTS.filter(a=>a.sev===alertFilter),[alertFilter]);

  const handleSearch=()=>{
    if(!query.trim()){setSearchResults(null);setActiveTab("overview");return;}
    let q=query.trim().toLowerCase().replace(/^index=\S*\s*/i,"").replace(/\|\s*search\s*/i,"").replace(/\|\s*head\s*\d*/i,"").replace(/"/g,"").trim();
    if(q){setSearchResults(q);setActiveTab("events");}
  };

  const loginChart=useMemo(()=>{
    const days=["Mar 4","Mar 5","Mar 6","Mar 7","Mar 8","Mar 9","Mar 10"];
    return days.map(d=>{
      const dl=LOGS.filter(l=>l.type==="login"&&l.t.includes("2024-03-"+d.split(" ")[1].padStart(2,"0")));
      return {label:d,success:dl.filter(l=>l.status==="success").length,fail:dl.filter(l=>l.status==="failure").length,total:dl.length};
    });
  },[]);

  const topIPs=useMemo(()=>{
    const c={}; LOGS.filter(l=>l.status==="failure").forEach(l=>{c[l.src]=(c[l.src]||0)+1;});
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[]);

  const sevCounts=useMemo(()=>{const c={critical:0,high:0,medium:0,low:0};ALERTS.forEach(a=>{c[a.sev]=(c[a.sev]||0)+1;});return c;},[]);

  const mitreCoverage=useMemo(()=>{
    let det=0,sus=0,no=0,tot=0;
    MITRE_MATRIX.forEach(t=>t.techniques.forEach(tc=>{tot++;if(tc.status==="detected")det++;else if(tc.status==="suspected")sus++;else no++;}));
    return {det,sus,no,tot,pct:Math.round((det/tot)*100)};
  },[]);

  const evTypes=useMemo(()=>["all",...new Set(LOGS.map(l=>l.type))]  ,[]);

  const typeBg=t=>t==="login"?"#4fc3f722":t.includes("email")?"#ffd70022":t==="process_create"?"#ff444422":t==="smb_access"?"#ff8c0022":t==="registry_write"?"#e040fb22":"#6bbd5b22";
  const typeCol=t=>t==="login"?"#4fc3f7":t.includes("email")?"#ffd700":t==="process_create"?"#ff4444":t==="smb_access"?"#ff8c00":t==="registry_write"?"#e040fb":"#6bbd5b";

  const stats=[
    {label:"Total Events",value:LOGS.length,icon:I.activity,color:"#6bbd5b",spark:[3,7,5,8,4,6,9]},
    {label:"Active Alerts",value:ALERTS.length,icon:I.alert,color:"#ff4444",spark:[0,0,2,3,2,1,0]},
    {label:"Failed Logins",value:LOGS.filter(l=>l.type==="login"&&l.status==="failure").length,icon:I.lock,color:"#ff8c00",spark:[0,8,0,0,0,0,0]},
    {label:"Unique Users",value:[...new Set(LOGS.map(l=>l.user))].length,icon:I.users,color:"#4fc3f7",spark:[6,7,5,7,5,4,6]},
  ];

  const tabs=[
    {id:"overview",label:"Overview",icon:"chart"},
    {id:"alerts",label:"Alerts",icon:"bell"},
    {id:"events",label:"Events",icon:"terminal"},
    {id:"investigation",label:"Investigate",icon:"eye"},
    {id:"mitre",label:"ATT&CK",icon:"map"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#0f0f0f",color:"#e0e0e0",fontFamily:"'DM Sans',sans-serif"}}>

      {/* ── TOP BAR ── */}
      <div style={{background:"#0a0a0a",borderBottom:"1px solid #1e1e1e",padding:"7px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:6,background:"linear-gradient(135deg,#6bbd5b,#2a6a2a)",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.shield("#fff",16)}</div>
          <span style={{fontWeight:800,fontSize:14,letterSpacing:"-0.3px"}}>MERIDIAN</span>
          <span style={{fontWeight:300,fontSize:14,color:"#6bbd5b"}}>SOC</span>
          <span style={{fontSize:9,color:"#555",marginLeft:6,padding:"2px 7px",border:"1px solid #252525",borderRadius:3}}>SIEM v9.2</span>
        </div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#555",display:"flex",alignItems:"center",gap:6}}>
          <span className="live" style={{width:6,height:6,borderRadius:3,background:"#6bbd5b",display:"inline-block"}}/>
          {clock}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setActiveTab("alerts")}>
            {I.bell(activeTab==="alerts"?"#ff4444":"#888",16)}
            <div style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:7,background:"#ff4444",fontSize:9,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{ALERTS.length}</div>
          </div>
          <div style={{width:26,height:26,borderRadius:13,background:"#2a6a2a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>MC</div>
        </div>
      </div>

      <div style={{display:"flex"}}>
        {/* ── SIDEBAR ── */}
        <div style={{width:52,background:"#0a0a0a",borderRight:"1px solid #1e1e1e",padding:"10px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minHeight:"calc(100vh - 48px)"}}>
          {tabs.map(tab=>{
            const active=activeTab===tab.id;
            const iconFn=tab.icon==="chart"?I.chart:tab.icon==="bell"?I.bell:tab.icon==="terminal"?I.terminal:tab.icon==="eye"?I.eye:I.map;
            return (
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} title={tab.label}
                style={{width:38,height:38,borderRadius:6,border:"none",background:active?"#1a3a1a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                {iconFn(active?"#6bbd5b":"#555",17)}
                {tab.id==="alerts"&&<div style={{position:"absolute",top:4,right:4,width:7,height:7,borderRadius:4,background:"#ff4444"}}/>}
              </button>
            );
          })}
        </div>

        {/* ── MAIN CONTENT ── */}
        <div style={{flex:1,padding:18,maxHeight:"calc(100vh - 48px)",overflowY:"auto"}}>

          {/* Search */}
          <div style={{display:"flex",gap:8,alignItems:"center",background:"#141414",border:"1px solid #252525",borderRadius:5,padding:"5px 12px",marginBottom:14}}>
            {I.search("#6bbd5b",15)}
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSearch()}
              placeholder='index=* | search user=jsmith src=185.220.101.42 type=login ...'
              style={{flex:1,background:"transparent",border:"none",color:"#e0e0e0",fontFamily:"'JetBrains Mono',monospace",fontSize:12,outline:"none"}}/>
            <button onClick={handleSearch} style={{background:"#6bbd5b",color:"#000",border:"none",borderRadius:3,padding:"3px 14px",fontWeight:700,cursor:"pointer",fontSize:11}}>Search</button>
          </div>

          {/* ══ OVERVIEW ══ */}
          {activeTab==="overview"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {stats.map((s,i)=>(
                  <div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5}}>{s.label}</div>
                        <div style={{fontSize:26,fontWeight:800,letterSpacing:"-1px"}}>{s.value}</div>
                      </div>
                      <div style={{width:30,height:30,borderRadius:6,background:s.color+"15",display:"flex",alignItems:"center",justifyContent:"center"}}>{s.icon(s.color,14)}</div>
                    </div>
                    <div style={{marginTop:8}}><MiniBar data={s.spark} color={s.color}/></div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:12}}>
                <div style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:14}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                    {I.activity("#6bbd5b",13)} Login Activity by Day
                    <span style={{marginLeft:"auto",display:"flex",gap:10,fontSize:10}}>
                      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:2,background:"#6bbd5b",display:"inline-block"}}/>Success</span>
                      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:2,background:"#ff4444",display:"inline-block"}}/>Failure</span>
                    </span>
                  </div>
                  <TimeChart data={loginChart} width={500} height={170}/>
                </div>
                <div style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:14}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>{I.alert("#ff4444",13)} Alerts by Severity</div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
                    <DonutChart segments={[{value:sevCounts.critical,color:SEV.critical},{value:sevCounts.high,color:SEV.high}]} size={110}/>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {Object.entries(sevCounts).filter(([_,v])=>v>0).map(([k,v])=>(
                        <div key={k} style={{display:"flex",alignItems:"center",gap:7,fontSize:11}}>
                          <span style={{width:7,height:7,borderRadius:2,background:SEV[k],display:"inline-block"}}/>
                          <span style={{color:"#999",textTransform:"capitalize"}}>{k}</span>
                          <span style={{fontWeight:700,marginLeft:4}}>{v}</span>
                        </div>
                      ))}
                      <div style={{marginTop:4,paddingTop:4,borderTop:"1px solid #222",fontSize:10,color:"#555"}}>
                        MITRE Coverage: <span style={{color:"#6bbd5b",fontWeight:700}}>{mitreCoverage.pct}%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:14}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>{I.globe("#ff8c00",13)} Top Source IPs (Failed Auth)</div>
                  {topIPs.map(([ip,count],i)=>(
                    <div key={ip} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<topIPs.length-1?"1px solid #1a1a1a":"none"}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,flex:1,color:!ip.startsWith("10.")?"#ff8c00":"#e0e0e0"}}>{ip}</span>
                      <div style={{width:100,height:5,background:"#1e1e1e",borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:`${(count/topIPs[0][1])*100}%`,height:"100%",background:count>3?"#ff4444":"#ff8c00",borderRadius:3}}/>
                      </div>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#ff4444",fontWeight:700,width:24,textAlign:"right"}}>{count}</span>
                    </div>
                  ))}
                </div>
                <div style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:14}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>{I.skull("#ff4444",13)} Critical Alerts</div>
                  {ALERTS.filter(a=>a.sev==="critical").map(a=>(
                    <div key={a.id} className="al-row" onClick={()=>{setSelectedAlert(a);setActiveTab("alerts");}}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #1a1a1a",cursor:"pointer"}}>
                      <span style={{width:7,height:7,borderRadius:4,background:SEV[a.sev],flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.title}</div>
                        <div style={{fontSize:10,color:"#555"}}>{a.time}</div>
                      </div>
                      {I.chevR("#333",13)}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ══ ALERTS ══ */}
          {activeTab==="alerts"&&(
            <div style={{display:selectedAlert?"grid":"block",gridTemplateColumns:selectedAlert?"1fr 1fr":"1fr",gap:14}}>
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <h2 style={{margin:0,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",gap:7}}>{I.bell("#ff4444",15)} Alert Queue ({filteredAlerts.length})</h2>
                  <div style={{display:"flex",gap:4}}>
                    {["all","critical","high","medium"].map(f=>(
                      <button key={f} onClick={()=>setAlertFilter(f)}
                        style={{padding:"3px 10px",borderRadius:4,border:`1px solid ${alertFilter===f?(f==="all"?"#6bbd5b":SEV[f]):"#252525"}`,
                          background:alertFilter===f?(f==="all"?"#6bbd5b18":SEV[f]+"18"):"transparent",
                          color:alertFilter===f?(f==="all"?"#6bbd5b":SEV[f]):"#666",fontSize:10,fontWeight:700,textTransform:"capitalize"}}>
                        {f==="all"?`All (${ALERTS.length})`:`${f} (${ALERTS.filter(a=>a.sev===f).length})`}
                      </button>
                    ))}
                  </div>
                </div>
                {filteredAlerts.map(a=>{
                  const st=alertStatuses[a.id]||a.status;
                  return (
                    <div key={a.id} className="al-row" onClick={()=>setSelectedAlert(a)}
                      style={{background:selectedAlert?.id===a.id?"#182818":"#141414",border:`1px solid ${selectedAlert?.id===a.id?"#6bbd5b33":"#1e1e1e"}`,
                        borderRadius:7,padding:12,marginBottom:7,cursor:"pointer",borderLeft:`3px solid ${SEV[a.sev]}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                        <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:3,background:SEV[a.sev]+"22",color:SEV[a.sev],textTransform:"uppercase"}}>{a.sev}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#555"}}>{a.id}</span>
                        <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,marginLeft:"auto",
                          background:st==="new"?"#ff444418":st==="investigating"?"#ffd70018":st==="escalated"?"#ff8c0018":"#6bbd5b18",
                          color:st==="new"?"#ff4444":st==="investigating"?"#ffd700":st==="escalated"?"#ff8c00":"#6bbd5b"}}>{st}</span>
                      </div>
                      <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{a.title}</div>
                      <div style={{fontSize:10,color:"#555",display:"flex",gap:14}}>
                        <span>{I.clock("#555",9)} {a.time}</span>
                        <span>{I.globe("#555",9)} {a.src}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#666"}}>{a.mitre}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              {selectedAlert&&(
                <div className="slide-in" style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,padding:18,position:"sticky",top:0,maxHeight:"calc(100vh - 110px)",overflowY:"auto"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <div>
                      <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:3,background:SEV[selectedAlert.sev]+"22",color:SEV[selectedAlert.sev],textTransform:"uppercase"}}>{selectedAlert.sev}</span>
                      <h3 style={{margin:"7px 0 0",fontSize:14,fontWeight:700}}>{selectedAlert.title}</h3>
                    </div>
                    <button onClick={()=>setSelectedAlert(null)} style={{background:"none",border:"none",padding:0}}>{I.x("#555",15)}</button>
                  </div>

              </div>

              {/* Coverage summary */}
              <div style={{display:"flex",gap:10,marginBottom:14,padding:"10px 14px",background:"#141414",borderRadius:8,border:"1px solid #1e1e1e",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#555",textTransform:"uppercase",fontWeight:700,marginBottom:4}}>TTP Detection Coverage</div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <div style={{flex:1,height:5,background:"#1e1e1e",borderRadius:3,overflow:"hidden",display:"flex"}}>
                      <div style={{width:`${(mitreCoverage.det/mitreCoverage.tot)*100}%`,background:"#6bbd5b",borderRadius:"3px 0 0 3px"}}/>
                      <div style={{width:`${(mitreCoverage.sus/mitreCoverage.tot)*100}%`,background:"#ffd700"}}/>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:"#6bbd5b"}}>{mitreCoverage.pct}%</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:16}}>
                  {[["Detected",mitreCoverage.det,"#6bbd5b"],["Suspected",mitreCoverage.sus,"#ffd700"],["Not Seen",mitreCoverage.no,"#444"]].map(([l,v,c])=>(
                    <div key={l} style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                      <div style={{fontSize:9,color:"#555",textTransform:"uppercase"}}>{l}</div>
                    </div>
                  ))}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:18,fontWeight:800,color:"#888"}}>{mitreCoverage.tot}</div>
                    <div style={{fontSize:9,color:"#555",textTransform:"uppercase"}}>Total TTPs</div>
                  </div>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:selectedTech?"1fr 380px":"1fr",gap:14}}>
                <div>
                  {mitreView==="matrix"&&<MitreHeatmapView matrix={MITRE_MATRIX} selected={selectedTech} onSelect={(tech,tac)=>{setSelectedTech(tech);setSelectedTactic(tac);}}/>}
                  {mitreView==="cards"&&(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                      {MITRE_MATRIX.map(t=>(
                        <div key={t.id} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:8,overflow:"hidden"}}>
                          <div style={{background:t.color+"18",borderBottom:`2px solid ${t.color}`,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div>
                              <div style={{fontSize:9,color:"#555"}}>{t.id}</div>
                              <div style={{fontSize:11,fontWeight:800,color:t.color,textTransform:"uppercase",letterSpacing:"0.4px"}}>{t.tactic}</div>
                            </div>
                            <div style={{fontSize:10,color:"#555"}}>{t.techniques.filter(tc=>tc.status==="detected").length}/{t.techniques.length}</div>
                          </div>
                          <div style={{padding:"8px 10px"}}>
                            {t.techniques.map((tech,j)=>(
                              <div key={j} className="tech-cell" onClick={()=>{setSelectedTech(selectedTech?.id===tech.id?null:tech);setSelectedTactic(t);}}
                                style={{display:"flex",alignItems:"flex-start",gap:7,marginBottom:j<t.techniques.length-1?7:0,padding:"5px 7px",borderRadius:4,cursor:"pointer",
                                  background:selectedTech?.id===tech.id?STCOL[tech.status]+"22":"transparent",
                                  border:selectedTech?.id===tech.id?`1px solid ${STCOL[tech.status]}44`:"1px solid transparent"}}>
                                <div style={{width:7,height:7,borderRadius:4,background:STCOL[tech.status],flexShrink:0,marginTop:3}}/>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:STCOL[tech.status],fontWeight:700}}>{tech.id}</span>
                                    <span style={{fontSize:8,color:SEV[tech.sev],fontWeight:700,textTransform:"uppercase"}}>{tech.sev}</span>
                                  </div>
                                  <div style={{fontSize:11,color:"#bbb",lineHeight:1.3}}>{tech.name}</div>
                                  {tech.evidence&&<div style={{fontSize:10,color:"#555",marginTop:2,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tech.evidence}</div>}
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {selectedTech&&<TechDetailPanel tech={selectedTech} tactic={selectedTactic?.tactic} tacticColor={selectedTactic?.color} onClose={()=>setSelectedTech(null)}/>}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── STATUS BAR ── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#060606",borderTop:"1px solid #1a1a1a",padding:"3px 18px",display:"flex",gap:20,fontSize:9,color:"#444",fontFamily:"'JetBrains Mono',monospace",zIndex:100}}>
        <span style={{color:"#6bbd5b"}}>● LIVE</span>
        <span>EVENTS: {LOGS.length}</span>
        <span style={{color:"#ff4444"}}>ALERTS: {ALERTS.length}</span>
        <span>MITRE: {mitreCoverage.det}/{mitreCoverage.tot} detected</span>
        <span style={{marginLeft:"auto"}}>Meridian SOC SIEM v9.2 | Analyst: MC | Incident: INC-2024-0304</span>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
