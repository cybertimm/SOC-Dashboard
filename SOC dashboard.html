/* ═══════════════════════ CHART COMPONENTS ═══════════════════════ */
function TimeChart({data, width=700, height=180}) {
  const ref = useRef();
  useEffect(() => {
    if(!ref.current||!data.length) return;
    const svg = d3.select(ref.current); svg.selectAll("*").remove();
    const m={top:20,right:20,bottom:35,left:45}, w=width-m.left-m.right, h=height-m.top-m.bottom;
    const g = svg.append("g").attr("transform",`translate(${m.left},${m.top})`);
    const x = d3.scaleBand().domain(data.map(d=>d.label)).range([0,w]).padding(0.3);
    const y = d3.scaleLinear().domain([0,d3.max(data,d=>d.total)]).nice().range([h,0]);
    g.append("g").attr("transform",`translate(0,${h})`).call(d3.axisBottom(x).tickSize(0)).selectAll("text").style("fill","#888").style("font-size","10px").attr("transform","rotate(-30)").style("text-anchor","end");
    g.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-w)).selectAll("text").style("fill","#888").style("font-size","10px");
    g.selectAll(".tick line").style("stroke","#333"); g.selectAll(".domain").style("stroke","#444");
    data.forEach(d => {
      const failH = y(0)-y(d.fail), succH = y(0)-y(d.success);
      g.append("rect").attr("x",x(d.label)).attr("y",h-failH-succH).attr("width",x.bandwidth()).attr("height",succH).attr("fill","#6bbd5b").attr("rx",2);
      g.append("rect").attr("x",x(d.label)).attr("y",h-failH).attr("width",x.bandwidth()).attr("height",failH).attr("fill","#ff4444").attr("rx",2);
    });
  },[data,width,height]);
  return React.createElement("svg",{ref,width,height});
}

function MiniBar({data, color="#6bbd5b", w=180, h=30}) {
  const ref = useRef();
  useEffect(() => {
    if(!ref.current||!data.length) return;
    const svg = d3.select(ref.current); svg.selectAll("*").remove();
    const x = d3.scaleBand().domain(data.map((_,i)=>i)).range([0,w]).padding(0.4);
    const y = d3.scaleLinear().domain([0,d3.max(data)]).range([h,4]);
    data.forEach((v,i) => { svg.append("rect").attr("x",x(i)).attr("y",y(v)).attr("width",x.bandwidth()).attr("height",h-y(v)).attr("fill",color).attr("rx",2).attr("opacity",0.85); });
  },[data,color,w,h]);
  return React.createElement("svg",{ref,width:w,height:h});
}

function DonutChart({segments, size=120}) {
  const ref = useRef();
  useEffect(() => {
    if(!ref.current) return;
    const svg = d3.select(ref.current); svg.selectAll("*").remove();
    const r = size/2-10, g = svg.append("g").attr("transform",`translate(${size/2},${size/2})`);
    const pie = d3.pie().value(d=>d.value).sort(null);
    const arc = d3.arc().innerRadius(r*0.6).outerRadius(r);
    g.selectAll("path").data(pie(segments)).enter().append("path").attr("d",arc).attr("fill",d=>d.data.color).attr("stroke","#1e1e1e").attr("stroke-width",2);
    g.append("text").attr("text-anchor","middle").attr("dy","0.35em").style("fill","#e0e0e0").style("font-size","18px").style("font-weight","700").text(segments.reduce((a,s)=>a+s.value,0));
  },[segments,size]);
  return React.createElement("svg",{ref,width:size,height:size});
}
